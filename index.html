<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
    .app-bar {
      background: #0b78ba; color: white; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    .info-card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 48px; height: 48px; background: #e8f4fd; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .member-name { font-weight: 700; font-size: 16px; color: #1a1a1a; }
    .member-uid  { font-size: 13px; color: #666; margin-top: 2px; }
    .step-card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 14px;
    }
    .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .step-num {
      width: 28px; height: 28px; background: #0b78ba; color: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .step-title { font-weight: 600; font-size: 15px; color: #333; }
    #qr-placeholder-view {
      width: 100%; height: 260px;
      background: #f8fbff; border: 2px dashed #0b78ba; border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }
    #qr-placeholder-view p { color: #999; font-size: 13px; }
    #qr-wrap {
      position: relative; width: 100%; height: 280px;
      background: #000; border-radius: 8px; overflow: hidden; display: none;
    }
    #qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #qr-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .qr-frame {
      width: 210px; height: 210px; border: 3px solid #fff; border-radius: 12px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
      position: relative; overflow: hidden;
    }
    .qr-line {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: #0b78ba; animation: scan 1.8s linear infinite;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: calc(100% - 3px); } }
    #qr-hint {
      position: absolute; bottom: 10px; width: 100%;
      text-align: center; color: rgba(255,255,255,0.85); font-size: 12px;
    }
    .scan-result {
      background: #e8f5e9; border: 1px solid #4caf50; border-radius: 8px;
      padding: 10px 14px; display: none; align-items: center; gap: 8px; margin-top: 10px;
    }
    .scan-result.show { display: flex; }
    .scan-result span { color: #2e7d32; font-weight: 600; font-size: 14px; }
    .loc-status {
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      background: #fff3e0; border: 1px solid #ff9800; color: #e65100;
      display: flex; align-items: center; gap: 8px;
    }
    .loc-status.success { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
    #camera-preview {
      width: 100%; border-radius: 8px; background: #000;
      max-height: 220px; object-fit: cover; display: none;
    }
    #photo-preview {
      width: 100%; border-radius: 8px; max-height: 220px;
      object-fit: cover; display: none; border: 2px solid #4caf50;
    }
    .camera-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .btn {
      padding: 11px 18px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-primary   { background: #0b78ba; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-warning   { background: #ff9800; color: white; }
    .btn-success {
      background: #2e7d32; color: white; width: 100%;
      justify-content: center; font-size: 16px; padding: 14px;
      border: none; cursor: pointer; border-radius: 8px; margin-top: 4px;
    }
    .btn-success:disabled { background: #bdbdbd; cursor: not-allowed; }
    .status-msg {
      text-align: center; padding: 12px; border-radius: 8px; font-weight: 600;
      display: none; margin-top: 12px; font-size: 13px; word-break: break-all;
    }
    .status-msg.success {
      display: block; background: white; color: #2e7d32;
      padding: 40px 24px; border-radius: 16px; border: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10); margin-top: 24px; text-align: center;
    }
    .status-msg.error { display: block; background: #ffebee; color: #c62828; }
    .progress-bar {
      width: 100%; height: 6px; background: #e0e0e0;
      border-radius: 3px; margin-top: 10px; display: none;
    }
    .progress-fill { height: 100%; background: #0b78ba; border-radius: 3px; transition: width 0.3s; }
    .error-box {
      background: #ffebee; border: 1px solid #ef9a9a; border-radius: 8px;
      padding: 12px 14px; margin-top: 10px; display: none;
    }
    .error-box p { color: #c62828; font-size: 13px; margin-bottom: 8px; }
    #manual-input-row { display: none; margin-top: 10px; gap: 8px; }
    #manual-input-row input {
      flex: 1; padding: 10px 12px; border: 1px solid #ccc;
      border-radius: 8px; font-size: 14px;
    }
    #manual-input-row button {
      padding: 10px 14px; background: #0b78ba; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>

<div class="app-bar">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
    <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="12" y1="3" x2="12" y2="7"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </svg>
  Attendance Scanner
</div>

<div class="container">

  <div class="info-card">
    <div class="avatar">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0b78ba" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div>
      <div class="member-name"  id="display-name">Loading...</div>
      <div class="member-uid"   id="display-uid">Please wait...</div>
      <div class="member-uid"   id="display-project" style="color:#0b78ba;font-weight:600;margin-top:2px;"></div>
    </div>
  </div>

  <!-- Step 1: QR -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">Scan Training QR Code</div>
    </div>
    <div id="qr-placeholder-view">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0b78ba" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="5" y="5" width="3" height="3" fill="#0b78ba"/>
        <rect x="16" y="5" width="3" height="3" fill="#0b78ba"/>
        <rect x="5" y="16" width="3" height="3" fill="#0b78ba"/>
      </svg>
      <p>Tap the button below to start scanning</p>
    </div>
    <div id="qr-wrap">
      <video id="qr-video" autoplay playsinline muted></video>
      <canvas id="qr-canvas" style="display:none;"></canvas>
      <div id="qr-overlay">
        <div class="qr-frame"><div class="qr-line"></div></div>
      </div>
      <div id="qr-hint">Hold the QR code steady inside the box</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-start-scan" onclick="startScanner()" style="flex:1;justify-content:center;">
        📷 Start QR Scanner
      </button>
      <button class="btn btn-secondary" onclick="toggleManualInput()">⌨️ Manual</button>
    </div>
    <div class="error-box" id="qr-error-box">
      <p id="qr-error-text">Could not access camera.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-warning" onclick="retryScanner()">🔄 Retry</button>
        <button class="btn btn-secondary" onclick="toggleManualInput()">⌨️ Enter Manually</button>
      </div>
    </div>
    <div id="manual-input-row">
      <input type="text" id="manual-training-input" placeholder="Type training name here..."/>
      <button onclick="setManualTraining()">✔</button>
    </div>
    <div class="scan-result" id="scan-result">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="#2e7d32" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="training-name-display">Training scanned!</span>
    </div>
  </div>

  <!-- Step 2: Location -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">Capture Location</div>
    </div>
    <div class="loc-status" id="loc-status">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span id="loc-text">Requesting location...</span>
    </div>
  </div>

  <!-- Step 3: Photo -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-title">Take Attendance Photo</div>
    </div>
    <video id="camera-preview" autoplay playsinline></video>
    <img   id="photo-preview" alt="Captured photo">
    <div class="camera-controls">
      <button class="btn btn-primary"   id="btn-open-camera" onclick="openCamera()">📷 Open Camera</button>
      <button class="btn btn-primary"   id="btn-capture"     onclick="capturePhoto()" style="display:none;">📸 Capture</button>
      <button class="btn btn-secondary" id="btn-retake"      onclick="retakePhoto()"  style="display:none;">🔄 Retake</button>
    </div>
  </div>

  <button class="btn-success" id="btn-submit" onclick="submitAttendance()" disabled>
    ✅ Submit Attendance
  </button>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="status-msg" id="status-msg"></div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfYWxGTG0W_Cg84rRknMIx8hQlkSM95-o4Wtymf8gK24SDhWnjrmFGxPXtMJ01b6So/exec";

const state = {
  name: "", uid: "", project: "",
  trainingName: "", lat: null, lng: null,
  timestamp: "", photoBase64: "", photoStream: null
};

let scanStream    = null;
let scanInterval  = null;
let scannerActive = false;

function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
    const script = document.createElement("script");
    const timer  = setTimeout(() => {
      cleanup();
      reject(new Error("Request timed out"));
    }, 30000);
    window[cbName] = (data) => { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = () => { cleanup(); reject(new Error("Network error")); };
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cbName;
    document.head.appendChild(script);
  });
}

// ── ON LOAD ───────────────────────────────────────────────────────
window.onload = async () => {
  const params = new URLSearchParams(window.location.search);
  const uid    = (params.get("uid") || "").toString().trim().toUpperCase();
  state.uid    = uid;

  if (uid) {
    try {
      const json = await jsonpFetch(
        WEB_APP_URL + "?action=getmember&uid=" + encodeURIComponent(uid)
      );
      if (json.name)    state.name    = json.name;
      if (json.uid)     state.uid     = json.uid;
      if (json.project) state.project = json.project;
    } catch (e) { console.warn("Member fetch:", e); }
  }

  document.getElementById("display-name").textContent =
    state.name || "Name not found";
  document.getElementById("display-uid").textContent =
    state.uid || (uid ? "UID not found: " + uid : "No UID in URL");
  document.getElementById("display-project").textContent =
    state.project ? "📋 " + state.project : "";

  getLocation();
};

// ── QR SCANNER ────────────────────────────────────────────────────
async function startScanner() {
  if (scannerActive) return;
  const btn = document.getElementById("btn-start-scan");
  btn.disabled = true; btn.textContent = "⏳ Starting...";
  document.getElementById("qr-error-box").style.display = "none";

  try {
    try {
      scanStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
    } catch (e) {
      scanStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
      });
    }
  } catch (err) {
    showQRError("Camera permission denied. Tap Retry after allowing camera.");
    btn.disabled = false; btn.textContent = "📷 Start QR Scanner";
    return;
  }

  const video = document.getElementById("qr-video");
  video.srcObject = scanStream;
  await new Promise(r => { video.onloadedmetadata = () => video.play().then(r).catch(r); });

  document.getElementById("qr-placeholder-view").style.display = "none";
  document.getElementById("qr-wrap").style.display             = "block";
  btn.textContent = "🔍 Scanning...";
  scannerActive   = true;

  if (typeof BarcodeDetector !== "undefined") {
    try {
      const detector = new BarcodeDetector({ formats: ["qr_code"] });
      scanInterval = setInterval(() => nativeDecode(video, detector), 300);
    } catch (e) {
      loadJsQR(() => { scanInterval = setInterval(() => jsQRDecode(video), 300); });
    }
  } else {
    loadJsQR(() => { scanInterval = setInterval(() => jsQRDecode(video), 300); });
  }
}

async function nativeDecode(video, detector) {
  if (!scannerActive || video.readyState < 2) return;
  try {
    const barcodes = await detector.detect(video);
    if (barcodes.length > 0 && barcodes[0].rawValue) onScanSuccess(barcodes[0].rawValue);
  } catch (e) {}
}

function jsQRDecode(video) {
  if (!scannerActive || video.readyState < 2 || !window.jsQR) return;
  const canvas = document.getElementById("qr-canvas");
  const ctx    = canvas.getContext("2d");
  const w = video.videoWidth || 640, h = video.videoHeight || 480;
  if (canvas.width !== w) canvas.width = w;
  if (canvas.height !== h) canvas.height = h;
  ctx.drawImage(video, 0, 0, w, h);
  const img  = ctx.getImageData(0, 0, w, h);
  const code = window.jsQR(img.data, w, h, { inversionAttempts: "dontInvert" });
  if (code && code.data) onScanSuccess(code.data);
}

function loadJsQR(cb) {
  if (window.jsQR) { cb(); return; }
  const s = document.createElement("script");
  s.src     = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js";
  s.onload  = cb;
  s.onerror = () => showQRError("QR library failed to load. Use Manual entry.");
  document.head.appendChild(s);
}

function onScanSuccess(text) {
  if (!text || !scannerActive) return;
  stopScanner();
  state.trainingName = text.trim();
  document.getElementById("training-name-display").textContent = "✅ Training: " + state.trainingName;
  document.getElementById("scan-result").classList.add("show");
  document.getElementById("qr-wrap").style.display             = "none";
  document.getElementById("qr-placeholder-view").style.display = "none";
  const btn = document.getElementById("btn-start-scan");
  btn.textContent = "✅ Scanned"; btn.disabled = true;
  checkSubmitReady();
}

function stopScanner() {
  scannerActive = false;
  clearInterval(scanInterval); scanInterval = null;
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
}

function showQRError(msg) {
  document.getElementById("qr-error-text").textContent  = msg;
  document.getElementById("qr-error-box").style.display = "block";
  const btn = document.getElementById("btn-start-scan");
  btn.disabled = false; btn.textContent = "📷 Start QR Scanner";
}

function retryScanner() {
  stopScanner();
  document.getElementById("qr-error-box").style.display        = "none";
  document.getElementById("qr-wrap").style.display             = "none";
  document.getElementById("qr-placeholder-view").style.display = "block";
  setTimeout(startScanner, 300);
}

function toggleManualInput() {
  const row = document.getElementById("manual-input-row");
  row.style.display = (row.style.display === "flex") ? "none" : "flex";
  if (row.style.display === "flex") document.getElementById("manual-training-input").focus();
}

function setManualTraining() {
  const val = document.getElementById("manual-training-input").value.trim();
  if (!val) { alert("Please enter a training name."); return; }
  onScanSuccess(val);
  document.getElementById("manual-input-row").style.display = "none";
}

// ── LOCATION ──────────────────────────────────────────────────────
function getLocation() {
  if (!navigator.geolocation) {
    document.getElementById("loc-text").textContent = "Geolocation not supported.";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      state.lat       = pos.coords.latitude.toFixed(6);
      state.lng       = pos.coords.longitude.toFixed(6);
      state.timestamp = new Date().toLocaleString("en-IN");
      document.getElementById("loc-status").classList.add("success");
      document.getElementById("loc-text").textContent = "📍 " + state.lat + ", " + state.lng;
      checkSubmitReady();
    },
    () => { document.getElementById("loc-text").textContent = "Location denied. Enable GPS and refresh."; },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

// ── PHOTO ─────────────────────────────────────────────────────────
async function openCamera() {
  try {
    state.photoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } }
    });
    const video = document.getElementById("camera-preview");
    video.srcObject = state.photoStream; video.style.display = "block";
    document.getElementById("btn-open-camera").style.display = "none";
    document.getElementById("btn-capture").style.display     = "inline-flex";
  } catch (e) { alert("Camera denied. Please allow camera access and try again."); }
}

function capturePhoto() {
  const video = document.getElementById("camera-preview");
  const canvas = document.createElement("canvas");
  // ✅ Small size keeps base64 safely within GET URL limits
  canvas.width = 160; canvas.height = 120;
  canvas.getContext("2d").drawImage(video, 0, 0, 160, 120);
  const full = canvas.toDataURL("image/jpeg", 0.5);
  state.photoBase64 = full.split(",")[1];
  if (state.photoStream) state.photoStream.getTracks().forEach(t => t.stop());
  video.style.display = "none";
  const prev = document.getElementById("photo-preview");
  prev.src = full; prev.style.display = "block";
  document.getElementById("btn-capture").style.display = "none";
  document.getElementById("btn-retake").style.display  = "inline-flex";
  checkSubmitReady();
}

function retakePhoto() {
  state.photoBase64 = "";
  document.getElementById("photo-preview").style.display   = "none";
  document.getElementById("btn-retake").style.display      = "none";
  document.getElementById("btn-open-camera").style.display = "inline-flex";
  checkSubmitReady();
}

// ── SUBMIT ─────────────────────────────────────────────────────────
function checkSubmitReady() {
  document.getElementById("btn-submit").disabled =
    !(state.trainingName && state.lat && state.photoBase64);
}

function setProgress(pct, text) {
  document.getElementById("progress-bar").style.display = "block";
  document.getElementById("progress-fill").style.width  = pct + "%";
  document.getElementById("btn-submit").textContent     = text;
}

// ✅ FIX: Photo sent in the SAME GET request as attendance data.
//    Backend doGet "attendance" saves photo to Drive and writes URL
//    atomically into the same row — no separate POST, no blank Photo URL.
async function submitAttendance() {
  const btn = document.getElementById("btn-submit");
  const msg = document.getElementById("status-msg");
  btn.disabled = true; msg.style.display = "none";

  try {
    setProgress(30, "Saving & uploading photo...");

    const attendanceUrl = WEB_APP_URL
      + "?action=attendance"
      + "&name="         + encodeURIComponent(state.name         || "Unknown")
      + "&uid="          + encodeURIComponent(state.uid          || "Unknown")
      + "&project="      + encodeURIComponent(state.project      || "NA")
      + "&lat="          + encodeURIComponent(state.lat          || "0")
      + "&lng="          + encodeURIComponent(state.lng          || "0")
      + "&timestamp="    + encodeURIComponent(state.timestamp    || new Date().toLocaleString("en-IN"))
      + "&trainingName=" + encodeURIComponent(state.trainingName || "Unknown")
      + "&photo="        + encodeURIComponent(state.photoBase64  || ""); // ✅ KEY FIX

    const res = await jsonpFetch(attendanceUrl);
    if (!res.success) throw new Error(res.error || "Failed to save attendance");

    setProgress(100, "Done!");

    const displayName  = (state.name        || "Friend").trim();
    const trainingName = (state.trainingName || "the training").trim();
    const dateStr      = state.timestamp
      ? state.timestamp.split(",")[0].trim()
      : new Date().toLocaleDateString("en-IN");
    const photoSaved   = res.photoUrl
      ? "📸 Photo saved successfully."
      : "⚠️ Photo not saved (check image size).";

    setTimeout(() => {
      document.getElementById("progress-bar").style.display = "none";
      btn.style.display = "none";
      document.querySelectorAll(".step-card").forEach(c => c.style.display = "none");
      document.querySelector(".info-card").style.display = "none";
      msg.className     = "status-msg success";
      msg.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
      msg.innerHTML =
        "<div style='font-size:40px;margin-bottom:8px;'>&#127881;</div>" +
        "<div style='font-size:18px;font-weight:800;color:#1b5e20;margin-bottom:6px;'>" +
          "Thank You, " + displayName + "!" +
        "</div>" +
        "<div style='font-size:14px;font-weight:500;color:#2e7d32;line-height:1.6;'>" +
          "Your attendance for <strong>" + trainingName + "</strong><br>" +
          "on <strong>" + dateStr + "</strong> has been captured." +
        "</div>" +
        "<div style='margin-top:8px;font-size:12px;color:#555;'>" + photoSaved + "</div>" +
        "<div style='margin-top:10px;font-size:12px;color:#66bb6a;'>You may close this page.</div>";
    }, 500);

  } catch (e) {
    document.getElementById("progress-bar").style.display = "none";
    msg.className   = "status-msg error";
    msg.textContent = "❌ ERROR: " + e.message;
    msg.style.display = "block";
    btn.disabled    = false;
    btn.textContent = "↩ Retry Submit";
  }
}
</script>
</body>
</html>
